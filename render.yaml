databases:
  - name: taskmaster_db
    plan: free

services:
  - type: web
    name: taskmaster-pro
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma db push --accept-data-loss && node dist/server.js
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taskmaster_db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
    healthCheckPath: /
