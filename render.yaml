services:
  - type: web
    name: taskmaster-pro
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/server.js
    envVars:
      - key: DATABASE_URL
        value: "file:./prisma/dev.db" # SQLite for testing. Use PostgreSQL for production data.
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
    # Render Free Tier health check
    healthCheckPath: /api/v1/tasks/summary
