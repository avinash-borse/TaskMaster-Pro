services:
  - type: web
    name: taskmaster-pro
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npm run build && npx prisma db push --accept-data-loss
    startCommand: node dist/server.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
    healthCheckPath: /
